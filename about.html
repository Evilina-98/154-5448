<!DOCTYPE html>
<html lang="ru">
<head>
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>О школе | Школа Будущего</title>
    <style>
        * { box-sizing: border-box; }
        body {
            margin: 0;
            padding: 0;
            font-family: "Segoe UI", Tahoma, sans-serif;
            background: #0f172a;
            background: radial-gradient(circle at top, #1e1b4b 0%, #0f172a 100%);
            color: #f8fafc;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .container {
            max-width: 800px;
            width: 90%;
            margin: 40px auto;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(15px);
            padding: 40px;
            border-radius: 30px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }

        img {
            width: 100%;
            height: 300px;
            object-fit: cover;
            border-radius: 20px;
            margin-bottom: 30px;
            border: 1px solid rgba(96, 165, 250, 0.3);
        }

        h2 {
            font-size: 2.5rem;
            color: #60a5fa;
            text-align: center;
            margin-top: 0;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        p {
            line-height: 1.8;
            font-size: 1.1rem;
            color: #cbd5e1;
            margin-bottom: 20px;
        }

        .info-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin: 30px 0;
            text-align: center;
        }

        .info-item {
            background: rgba(96, 165, 250, 0.1);
            padding: 20px;
            border-radius: 15px;
            border: 1px solid rgba(96, 165, 250, 0.2);
        }

        .info-item b {
            display: block;
            font-size: 1.5rem;
            color: #4ade80;
        }

        .back-btn {
            display: block;
            width: fit-content;
            margin: 30px auto 0;
            padding: 12px 35px;
            background: linear-gradient(90deg, #3b82f6, #1d4ed8);
            color: white;
            text-decoration: none;
            border-radius: 50px;
            font-weight: bold;
            transition: 0.3s;
            box-shadow: 0 4px 15px rgba(59, 130, 246, 0.4);
        }

        .back-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 6px 20px rgba(59, 130, 246, 0.6);
        }
    </style>
</head>
<body>
    <div class="container">
        <h2>Наша школа</h2>
        
        <img src="images/school.png" alt="Школьное здание">
        
        <p>Мы — современная школа с инновационными методами обучения. Наша миссия — раскрыть потенциал каждого ученика и подготовить его к вызовам цифрового мира завтрашнего дня!</p>
        
        <div class="info-grid">
            <div class="info-item">
                <b>1995</b>
                год основания
            </div>
            <div class="info-item">
                <b>1000+</b>
                учеников
            </div>
            <div class="info-item">
                <b>50</b>
                педагогов
            </div>
        </div>

        <a href="index.html" class="back-btn">Вернуться на главную</a>
    </div>
</body>
</html>
