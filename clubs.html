<!DOCTYPE html>
<html lang="ru">
<head>
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Кружки | Выбор занятий</title>
    <style>
        * { box-sizing: border-box; }
        body {
            margin: 0;
            padding: 0;
            font-family: "Segoe UI", Tahoma, sans-serif;
            background: #0f172a;
            background: radial-gradient(circle at top, #1e1b4b 0%, #0f172a 100%);
            color: #f8fafc;
            min-height: 100vh;
        }

        .container {
            max-width: 1100px;
            margin: 0 auto;
            padding: 60px 20px;
        }

        h1 {
            font-size: 2.5rem;
            color: #60a5fa;
            text-align: center;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 40px;
        }

        .clubs-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 25px;
        }

        .club-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            padding: 20px;
            border-radius: 25px;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.3s ease;
        }

        .club-card:hover {
            transform: translateY(-10px);
            border-color: #60a5fa;
            background: rgba(255, 255, 255, 0.08);
            box-shadow: 0 15px 30px rgba(0,0,0,0.4);
        }

        .club-img {
            width: 100%;
            height: 160px;
            object-fit: cover;
            border-radius: 15px;
            margin-bottom: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        h3 {
            margin: 10px 0;
            color: #fff;
            font-size: 1.4rem;
        }

        p {
            color: #4ade80;
            font-weight: bold;
            font-size: 0.95rem;
            background: rgba(74, 222, 128, 0.1);
            display: inline-block;
            padding: 5px 15px;
            border-radius: 50px;
        }

        .back-btn {
            display: block;
            width: fit-content;
            margin: 50px auto 0;
            padding: 12px 35px;
            background: linear-gradient(90deg, #3b82f6, #1d4ed8);
            color: white;
            text-decoration: none;
            border-radius: 50px;
            font-weight: bold;
            transition: 0.3s;
            box-shadow: 0 4px 15px rgba(59, 130, 246, 0.4);
        }

        .back-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 6px 20px rgba(59, 130, 246, 0.6);
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Кружки и секции</h1>

        <div class="clubs-grid">
            <div class="club-card">
                <img src="images/art.jpg" alt="Рисование" class="club-img">
                <h3>Рисование</h3>
                <p>Вт, Чт - 16:00</p>
            </div>

            <div class="club-card">
                <img src="images/gym.jpg" alt="Легкая атлетика" class="club-img">
                <h3>Легкая атлетика</h3>
                <p>Ср - 17:00</p>
            </div>

            <div class="club-card">
                <img src="images/ball.jpg" alt="Футбол" class="club-img">
                <h3>Футбол</h3>
                <p>Пн, Пт - 18:00</p>
            </div>

            <div class="club-card">
                <img src="images/chess.jpg" alt="Настольные игры" class="club-img">
                <h3>Настольные игры</h3>
                <p>Пн, Ср - 15:30</p>
            </div>

            <div class="club-card">
                <img src="images/dance.jpg" alt="Танцевальная студия" class="club-img">
                <h3>Танцевальная студия</h3>
                <p>Вт, Чт - 17:30</p>
            </div>

            <div class="club-card">
                <img src="images/robot.jpg" alt="Робототехника" class="club-img">
                <h3>Робототехника</h3>
                <p>Сб - 16:30</p>
            </div>
        </div>

        <a href="index.html" class="back-btn">Вернуться на главную</a>
    </div>

</body>
</html>
