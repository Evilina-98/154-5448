<!DOCTYPE html>
<html lang="ru">
<head>
    <meta http-equiv="Content-Type" content="text/html; charset=windows-1251">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Галерея | Школа Будущего</title>
    <style>
        * { box-sizing: border-box; }
        body {
            margin: 0;
            padding: 0;
            font-family: "Segoe UI", Tahoma, sans-serif;
            background: #0f172a;
            background: radial-gradient(circle at top, #1e1b4b 0%, #0f172a 100%);
            color: #f8fafc;
            min-height: 100vh;
            text-align: center;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 60px 20px;
        }

        h1 {
            font-size: 2.5rem;
            color: #60a5fa;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 40px;
        }

        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 30px;
            margin-bottom: 50px;
        }

        .gallery-item {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            padding: 15px;
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.4s ease;
            overflow: hidden;
        }

        .gallery-item:hover {
            transform: translateY(-10px);
            border-color: #60a5fa;
            background: rgba(255, 255, 255, 0.08);
            box-shadow: 0 15px 30px rgba(0,0,0,0.4);
        }

        .img-wrap {
            width: 100%;
            height: 220px;
            overflow: hidden;
            border-radius: 12px;
            background: #1e293b;
        }

        .gallery-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.5s ease;
        }

        .gallery-item:hover img {
            transform: scale(1.1);
        }

        .gallery-item p {
            margin: 15px 0 5px;
            font-size: 1.2rem;
            font-weight: bold;
            color: #4ade80;
        }

        .back-btn {
            display: inline-block;
            padding: 12px 35px;
            background: linear-gradient(90deg, #3b82f6, #1d4ed8);
            color: white;
            text-decoration: none;
            border-radius: 50px;
            font-weight: bold;
            transition: 0.3s;
            box-shadow: 0 4px 15px rgba(59, 130, 246, 0.4);
        }

        .back-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 6px 20px rgba(59, 130, 246, 0.6);
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Фотоархив школы</h1>
        
        <div class="gallery-grid">
            <div class="gallery-item">
                <div class="img-wrap"><img src="images/foto1.jpg" alt="День знаний"></div>
                <p>День знаний</p>
            </div>
            <div class="gallery-item">
                <div class="img-wrap"><img src="images/foto2.jpg" alt="День учителя"></div>
                <p>День учителя</p>
            </div>
            <div class="gallery-item">
                <div class="img-wrap"><img src="images/foto3.jpg" alt="Осенний бал"></div>
                <p>Осенний бал</p>
            </div>
            <div class="gallery-item">
                <div class="img-wrap"><img src="images/foto4.jpg" alt="Новый год"></div>
                <p>Новый год</p>
            </div>
            <div class="gallery-item">
                <div class="img-wrap"><img src="images/foto5.jpg" alt="Последний звонок"></div>
                <p>Последний звонок</p>
            </div>
            <div class="gallery-item">
                <div class="img-wrap"><img src="images/foto6.jpg" alt="Спорт"></div>
                <p>Спортивный праздник</p>
            </div>
        </div>

        <a href="index.html" class="back-btn">Вернуться на главную</a>
    </div>
</body>
</html>
